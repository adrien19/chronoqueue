// ./chronoq/proto/queue/v1/queue.proto

syntax = "proto3";

package chronoqueue.api.queue.v1;

import "google/protobuf/duration.proto";
option go_package = "github.com/adrien19/chronoqueue/api/queue/v1;queue";

enum QueueType {
    SIMPLE = 0;
    EXCLUSIVE = 1;
}

message QueueMetadata {
    reserved 5;
    reserved "invisibility_duration";
    
    QueueType type = 1;
    int32 default_max_attempts = 2;
    google.protobuf.Duration lease_duration = 3;
    string exclusivity_key = 4;
    string dead_letter_queue_name = 6;
    bool auto_create_dlq = 7;
    string schema_id = 8;           // Default schema for queue messages
    bool schema_required = 9;       // Require schema validation for messages
    int32 max_payload_size = 10;   // Override default max payload size (bytes)
    repeated string allowed_content_types = 11; // Allowed MIME types (empty = all allowed)
    PriorityConfig priority_config = 12;
}

enum FairnessPolicy {
    STRICT = 0;
    WEIGHTED = 1;
    AGING = 2;
    HYBRID = 3;
}

message PriorityConfig {
    FairnessPolicy policy = 1;
    map<int32, int32> priority_weights = 2;
    google.protobuf.Duration age_boost_threshold = 3;
    int32 age_boost_multiplier = 4;
}

message Queue {
    string name = 1;
    QueueMetadata metadata = 2;
}
