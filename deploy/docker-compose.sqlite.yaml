
services:
  chronoqueuesvc:
    container_name: chronoqueue-server
    hostname: chronoqueue-server
    build:
      context: ..
      dockerfile: ./images/Dockerfile.sqlite
    environment:
      - SERVER_MODE=development
      - STORAGE_TYPE=sqlite
      - SQLITE_DB_PATH=/data/chronoqueue.db
      - GRPC_ADDR=:9000
      - HTTP_ADDR=:8080
      - SERVER_CERT_PATH=/secrets/server.crt
      - SERVER_KEY_PATH=/secrets/server.key
      - CA_CERT_PATH=/secrets/ca.crt
      - CHRONOQUEUE_TLS_ENABLED=false
      - ENABLE_ENCRYPTION=true
      - ENCRYPTION_KEY_SOURCE_TYPE=LOCAL
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
      - LOG_LEVEL=debug
      - LOG_FORMAT=text
      - ENABLE_API_DOCS=true
      - API_DOCS_CORS_ORIGINS=*
    networks:
      - chronoqueue-network
    volumes:
      - ${WORKSPACE_FOLDER}/certs:/secrets
      - sqlite-data:/data
    ports:
      - "9000:9000"
      - "8080:8080"
    restart: unless-stopped

  chronoqueue-ui:
    container_name: chronoqueue-ui
    hostname: chronoqueue-ui
    build:
      context: ..
      dockerfile: ./images/Dockerfile.sqlite
    entrypoint: ["/chronoqueue"]
    command:
      - web-ui
      - start
      - --port
      - "8081"
      - --grpc-address
      - chronoqueue-server:9000
      - --skip-ssl
    depends_on:
      - chronoqueuesvc
    networks:
      - chronoqueue-network
    ports:
      - "8081:8081"
    restart: unless-stopped

networks:
  chronoqueue-network:
    driver: bridge

volumes:
  sqlite-data:
    driver: local
