version: '3.5'

services:
  chronoqueuesvc:
    container_name: chronoqueue_container
    hostname: chronoqueue_container
    build: 
      context: ..
      dockerfile: ./images/Dockerfile
    # env_file: .env
    environment:
      - HOST=chronoqueue_container
      - AUTH_SERVICE_HOST=authentication
    depends_on:
      - cachesvc
      # - authenticationsvc
    networks:
      - chronoqueue_network
    ports:
      - "9000:9000"
      - "9001:9001"

  cachesvc:
    image: bitnami/redis:latest
    container_name: cachesvc_container
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - '6379:6379'
    networks:
      - chronoqueue_network
    volumes: 
      - cachesvc:/data
    restart: unless-stopped

networks:
  chronoqueue_network:
    # external: true

volumes:
    cachesvc:
