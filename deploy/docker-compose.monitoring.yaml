
services:
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: chronoqueue-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ${WORKSPACE_FOLDER}/deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${WORKSPACE_FOLDER}/monitoring/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    networks:
      - chronoqueue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  grafana:
    image: grafana/grafana:10.2.2
    container_name: chronoqueue-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ${WORKSPACE_FOLDER}/deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${WORKSPACE_FOLDER}/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/chronoqueue-main.json:ro
    networks:
      - chronoqueue-network
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  chronoqueue-network:
    external: true

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
