{{/* Base layout template */}}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - ChronoQueue</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/alpinejs@3.14.9/dist/cdn.min.js" defer></script>
</head>

<body class="bg-gray-50">
    <div class="min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white flex flex-col relative">
            <div class="p-4">
                <h1 class="text-2xl font-bold">ChronoQueue</h1>
                <p class="text-gray-400 text-sm">Message Queue Management</p>
            </div>
            <nav class="mt-8">
                <a href="/" class="block px-4 py-2 {{if eq .CurrentPage "dashboard"}}bg-gray-800{{end}}
                    hover:bg-gray-800">
                    Dashboard
                </a>
                <a href="/queues" class="block px-4 py-2 {{if eq .CurrentPage "queues"}}bg-gray-800{{end}}
                    hover:bg-gray-800">
                    Queues
                </a>
                <a href="/schedules" class="block px-4 py-2 {{if eq .CurrentPage "schedules"}}bg-gray-800{{end}}
                    hover:bg-gray-800">
                    Schedules
                </a>
            </nav>
            <!-- Footer -->
            <div class="absolute bottom-0 left-0 w-64 p-4 border-t border-gray-800">
                <pre class="text-gray-400 text-xs mb-3 font-mono whitespace-pre-wrap">Version: {{.VersionInfo}}</pre>
                <a href="https://github.com/adrien19/chronoqueue" target="_blank" rel="noopener noreferrer"
                    class="flex items-center justify-center gap-2 px-3 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm transition-colors">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd"
                            d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"
                            clip-rule="evenodd" />
                    </svg>
                    Star us on GitHub
                </a>
            </div>
        </aside>

        <!-- Main content -->
        <main class="flex-1 p-8">
            {{template "page-content" .}}
        </main>
    </div>
</body>

</html>
