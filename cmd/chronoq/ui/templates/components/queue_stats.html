{{define "queue-stats-fragment"}}
<div class="bg-white rounded-lg shadow p-6">
    <div class="text-sm font-medium text-gray-600">Pending</div>
    <div class="mt-2 text-3xl font-semibold text-blue-600">{{.PendingCount}}</div>
</div>
<div class="bg-white rounded-lg shadow p-6">
    <div class="text-sm font-medium text-gray-600">Running</div>
    <div class="mt-2 text-3xl font-semibold text-yellow-600">{{.RunningCount}}</div>
</div>
<div class="bg-white rounded-lg shadow p-6">
    <div class="text-sm font-medium text-gray-600">Completed</div>
    <div class="mt-2 text-3xl font-semibold text-green-600">{{.CompletedCount}}</div>
</div>
<div class="bg-white rounded-lg shadow p-6">
    <div class="text-sm font-medium text-gray-600">Failed</div>
    <div class="mt-2 text-3xl font-semibold text-red-600">{{.FailedCount}}</div>
</div>
{{end}}
