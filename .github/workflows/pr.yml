name: PR Validation

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  PROTOC_VERSION: "32.0"

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
        continue-on-error: true

      - name: Verify go.mod and go.sum
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "::error::go.mod or go.sum is not tidy. Run 'make modtidy' and commit the changes." && exit 1)

      - name: Check for generated proto files
        run: |
          # Check if proto files exist
          if [ -d "proto" ]; then
            echo "Proto files found. Checking if generated files are up to date..."
            
            # Install proto tools if proto files are modified
            if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^proto/"; then
              echo "Proto files modified. Verifying generated code..."
              
              # This would require proto generation - skip for now if tools not available
              echo "::warning::Proto files were modified. Ensure you run 'make gen-proto' locally."
            fi
          fi

      - name: Check for direct commits to protected branches
        run: |
          if [[ "${{ github.base_ref }}" == "main" ]] || [[ "${{ github.base_ref }}" == "develop" ]]; then
            echo "✅ Using PR for protected branch - Good practice!"
          fi

      - name: Validate commit messages
        run: |
          echo "Checking commit messages..."
          git log --format=%B origin/${{ github.base_ref }}..HEAD | while read line; do
            if [ -n "$line" ]; then
              echo "Commit message: $line"
            fi
          done

      - name: Check for TODOs in diff
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD | grep -i "TODO\|FIXME\|XXX" ; then
            echo "::warning::Found TODO/FIXME comments in the changes. Please address them or create issues."
          else
            echo "✅ No TODO/FIXME comments found in changes."
          fi

      - name: PR size check
        run: |
          lines_changed=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $4+$6}')
          echo "Lines changed: $lines_changed"

          if [ "$lines_changed" -gt 1000 ]; then
            echo "::warning::This PR changes $lines_changed lines. Consider breaking it into smaller PRs for easier review."
          else
            echo "✅ PR size is reasonable ($lines_changed lines changed)."
          fi

      - name: Comment PR with validation results
        uses: actions/github-script@v7
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `
            ## PR Validation Results 🔍

            - ✅ Go modules verified
            - ✅ Commit messages checked
            - ✅ PR size analyzed

            **Next Steps:**
            - Ensure all CI checks pass
            - Request review from maintainers
            - Address any review comments

            Thank you for your contribution! 🚀
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  changes-detection:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      proto: ${{ steps.filter.outputs.proto }}
      docker: ${{ steps.filter.outputs.docker }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
            proto:
              - 'proto/**'
              - 'api/**'
            docker:
              - 'images/**'
              - 'docker/**'
              - 'Dockerfile*'
            docs:
              - '**/*.md'
              - 'docs/**'

  fast-tests:
    name: Fast Tests (Stable Components)
    runs-on: ubuntu-latest
    needs: [changes-detection]
    if: needs.changes-detection.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run stable component tests
        run: |
          CGO_ENABLED=0 gotestsum \
            --format testname \
            -- \
            ./client ./pkg/chronoqueue ./pkg/gateway ./pkg/metrics \
            ./internal/server ./internal/util ./internal/encryption/... ./pkg/log

  docker-validation:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: [changes-detection]
    if: needs.changes-detection.outputs.docker == 'true' || needs.changes-detection.outputs.backend == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: chronoqueue:pr-${{ github.event.pull_request.number }}
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
