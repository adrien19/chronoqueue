name: Branch Guard

# This workflow acts as a soft branch protection for private repos on free tier
# It won't prevent direct pushes, but will fail CI checks if rules are violated

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  check-direct-push:
    name: Check for Direct Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Fail on direct push to protected branch
        run: |
          echo "::error::❌ Direct push to ${{ github.ref_name }} is not allowed!"
          echo "::error::Please create a pull request instead."
          echo ""
          echo "To fix this:"
          echo "1. Create a new branch from your current commit:"
          echo "   git branch feature/your-changes"
          echo "2. Reset ${{ github.ref_name }} to remote:"
          echo "   git fetch origin"
          echo "   git reset --hard origin/${{ github.ref_name }}"
          echo "3. Push your branch and create a PR:"
          echo "   git checkout feature/your-changes"
          echo "   git push origin feature/your-changes"
          exit 1

  require-pr-context:
    name: Verify PR Context
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check PR requirements
        run: |
          echo "✅ Changes are coming via pull request - Good!"
          echo "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

      - name: Remind about review requirement
        run: |
          echo "⚠️ Note: This repository is on a free tier, so branch protection is not enforced."
          echo "📋 Before merging, please ensure:"
          echo "   - All CI checks pass"
          echo "   - Code has been reviewed"
          echo "   - All conversations are resolved"
