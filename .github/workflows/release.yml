name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.25.7"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "First release - no previous tag found"
            echo "## Initial Release 🎉" > CHANGELOG.md
          else
            echo "Generating changelog from $PREVIOUS_TAG to ${{ steps.version.outputs.version }}"
            {
              echo "## What's Changed in ${{ steps.version.outputs.version }}"
              echo ""
              git log ${PREVIOUS_TAG}..${{ steps.version.outputs.version }} --pretty=format:"- %s (%h)" --reverse
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ steps.version.outputs.version }}"
            } > CHANGELOG.md
          fi

          cat CHANGELOG.md

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(needs.prepare-release.outputs.version, 'rc') || contains(needs.prepare-release.outputs.version, 'beta') || contains(needs.prepare-release.outputs.version, 'alpha') }}
          generate_release_notes: true

  build-release-binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          BINARY_NAME="chronoqueue-${{ needs.prepare-release.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" == "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -v -trimpath \
            -ldflags="-s -w -X main.version=${{ needs.prepare-release.outputs.version }} -X main.commit=${{ github.sha }} -X main.buildDate=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            -o dist/${BINARY_NAME} \
            .

          # Create checksums
          cd dist
          sha256sum ${BINARY_NAME} > ${BINARY_NAME}.sha256

          # Create archive
          if [ "${{ matrix.goos }}" != "windows" ]; then
            tar -czf ${BINARY_NAME}.tar.gz ${BINARY_NAME}
            sha256sum ${BINARY_NAME}.tar.gz > ${BINARY_NAME}.tar.gz.sha256
          else
            # Use zip for Windows (install if not available)
            if ! command -v zip &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y zip
            fi
            zip ${BINARY_NAME}.zip ${BINARY_NAME}
            sha256sum ${BINARY_NAME}.zip > ${BINARY_NAME}.zip.sha256
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          files: |
            ./dist/*.tar.gz
            ./dist/*.tar.gz.sha256
            ./dist/*.zip
            ./dist/*.zip.sha256

  build-release-docker:
    name: Build & Push Release Docker Images
    runs-on: ubuntu-latest
    needs: [prepare-release, create-release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare-release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare-release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.prepare-release.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./images/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            VERSION=${{ needs.prepare-release.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [prepare-release, build-release-docker]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: image-tag
        run: |
          # Strip 'v' prefix from version for image tag
          VERSION="${{ needs.prepare-release.outputs.version }}"
          IMAGE_TAG="${VERSION#v}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

      - name: Wait for image to be available
        run: |
          IMAGE_FULL="${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}"

          echo "Waiting for image to be available in registry..."
          echo "Expected image: ${IMAGE_FULL}"

          # Retry pulling the image with backoff
          MAX_ATTEMPTS=5
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Checking if image is available..."

            if docker pull "${IMAGE_FULL}"; then
              echo "✅ Image found and pulled successfully!"
              break
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              WAIT_TIME=$((10 * ATTEMPT))  # Exponential backoff: 10s, 20s, 30s, 40s, 50s
              echo "Image not yet available. Waiting ${WAIT_TIME} seconds before retry..."
              sleep $WAIT_TIME
            else
              echo "❌ Image not found after $MAX_ATTEMPTS attempts."
              exit 1
            fi

            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Generate SBOM for release
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
          format: spdx-json
          output-file: sbom-${{ needs.prepare-release.outputs.version }}.spdx.json
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          upload-artifact: true
          upload-release-assets: false

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-${{ needs.prepare-release.outputs.version }}.spdx.json
          retention-days: 90

      - name: Upload SBOM to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          files: sbom-${{ needs.prepare-release.outputs.version }}.spdx.json

  release-verification:
    name: Verify Release
    runs-on: ubuntu-latest
    needs:
      [
        prepare-release,
        build-release-binaries,
        build-release-docker,
        generate-sbom,
      ]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Docker image
        run: |
          # Strip 'v' prefix from version for image tag
          VERSION="${{ needs.prepare-release.outputs.version }}"
          IMAGE_TAG="${VERSION#v}"

          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
          docker images | grep chronoqueue

      - name: Test Docker image
        run: |
          # Strip 'v' prefix from version for image tag
          VERSION="${{ needs.prepare-release.outputs.version }}"
          IMAGE_TAG="${VERSION#v}"

          docker run --rm ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} --version || true

      - name: Release Summary
        run: |
          # Strip 'v' prefix from version for image tag
          VERSION="${{ needs.prepare-release.outputs.version }}"
          IMAGE_TAG="${VERSION#v}"

          echo "## Release ${{ needs.prepare-release.outputs.version }} Published! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Binaries" >> $GITHUB_STEP_SUMMARY
          echo "Available for:" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (amd64, arm64, arm)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS (amd64, arm64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (amd64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 View release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare-release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
