name: Scheduled Tests

on:
  schedule:
    # Run every Monday at 2 AM UTC (weekly)
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: scheduled-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.7"

permissions:
  contents: read

jobs:
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run all tests
        run: make test

      - name: Run integration tests
        run: make ci-test-integration

      - name: Run E2E tests
        run: make ci-test-e2e

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -show verbose ./...

  report-failures:
    name: Report Failures
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    needs: [full-test-suite, dependency-audit]
    if: failure()
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v8
        with:
          script: |
            const title = `Scheduled tests failed on ${new Date().toISOString().split('T')[0]}`;
            const body = `
            The scheduled test run has failed.

            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please investigate the failures.
            `;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'scheduled-test-failure'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['scheduled-test-failure', 'bug']
              });
            }
